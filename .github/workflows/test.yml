name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check scanpy_diff/ tests/ --output-format sarif --output-file ruff-results.sarif || true

      - name: Upload Ruff SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ruff-results.sarif
          category: ruff

      - name: Upload Ruff SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruff-results-${{ matrix.python-version }}
          path: ruff-results.sarif

      - name: Test with pytest
        run: pytest tests/ -v --tb=short --cov=scanpy_diff --cov-report=xml

      - name: Upload Coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
